<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <main class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="container p-5 mt-5 mb-5 bg-light text-dark rounded shadow-lg" style="max-width: 750px;">
            <div class="text-center mb-5">
                <br><h1><span class="text-warning"><strong>Electricity</strong></span> Usage Checker</h1>
            </div>
            <div class="bg-white p-4 rounded mb-4 shadow-sm">
                <div class="row align-items-center">
                    <div class="col-12">
                        <h4 class="mb-3"><strong>Enter Usage</strong></h4>
                        <div class="mb-5">
                            <label class="form-label">kWh Used:</label>
                            <input type="number" id="planet1" class="form-control" placeholder="Enter kWh used"><br>
                            <p id="display1" style="color:red; font-weight:bold; margin-top: 10px;"></p>
                        </div>
                    </div>
                    <div class="button-container d-flex justify-content-evenly">
                        <button class="btn btn-warning mt-4 p-2 w-25" onclick="getKWH()">Check</button>
                        <button class="btn btn-warning mt-4 p-2 w-25" onclick="window.location.reload()">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
